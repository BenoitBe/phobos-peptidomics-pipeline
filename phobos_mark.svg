<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="mSurface" cx="38%" cy="35%" r="68%">
      <stop offset="0%"   stop-color="#cdbda3"/>
      <stop offset="45%"  stop-color="#917c66"/>
      <stop offset="100%" stop-color="#403229"/>
    </radialGradient>
    <radialGradient id="mTerm" cx="70%" cy="62%" r="58%">
      <stop offset="0%"   stop-color="#160d06" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#160d06" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mSpec" cx="32%" cy="28%" r="32%">
      <stop offset="0%"   stop-color="#ece1cd" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ece1cd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mStickney" cx="42%" cy="38%" r="62%">
      <stop offset="0%"   stop-color="#2a1f15"/>
      <stop offset="60%"  stop-color="#3d2f22"/>
      <stop offset="100%" stop-color="#5c4a35"/>
    </radialGradient>
    <clipPath id="mClip">
      <path d="M 60 14 C 74 13,90 17,98 28 C 106 40,105 55,100 67 C 94 80,82 90,68 96 C 54 101,38 100,27 92 C 15 83,11 68,13 54 C 15 40,23 27,34 20 C 43 14,51 14,60 14 Z"/>
    </clipPath>
    <filter id="mShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3.5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="mRegolith">
      <feTurbulence type="fractalNoise" baseFrequency="0.62" numOctaves="4" seed="11" result="n"/>
      <feColorMatrix type="saturate" values="0" in="n" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply" result="b"/>
      <feComposite in="b" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <g filter="url(#mShadow)">
    <path d="M 60 14 C 74 13,90 17,98 28 C 106 40,105 55,100 67 C 94 80,82 90,68 96 C 54 101,38 100,27 92 C 15 83,11 68,13 54 C 15 40,23 27,34 20 C 43 14,51 14,60 14 Z" fill="url(#mSurface)" filter="url(#mRegolith)"/>
    <path d="M 60 14 C 74 13,90 17,98 28 C 106 40,105 55,100 67 C 94 80,82 90,68 96 C 54 101,38 100,27 92 C 15 83,11 68,13 54 C 15 40,23 27,34 20 C 43 14,51 14,60 14 Z" fill="url(#mTerm)"/>
    <path d="M 60 14 C 74 13,90 17,98 28 C 106 40,105 55,100 67 C 94 80,82 90,68 96 C 54 101,38 100,27 92 C 15 83,11 68,13 54 C 15 40,23 27,34 20 C 43 14,51 14,60 14 Z" fill="url(#mSpec)"/>
  </g>

  <g clip-path="url(#mClip)">
    <!-- Stickney -->
    <ellipse cx="42" cy="50" rx="17" ry="14" fill="url(#mStickney)" opacity="0.9"/>
    <ellipse cx="42" cy="50" rx="17" ry="14" fill="none" stroke="#241a10" stroke-width="1.5" opacity="0.6"/>
    <ellipse cx="40" cy="48" rx="15.5" ry="12.5" fill="none" stroke="#c2b292" stroke-width="0.5" opacity="0.35"/>
    <circle  cx="42" cy="50" r="2.3" fill="#1c130b" opacity="0.5"/>
    <!-- grooves -->
    <g stroke="#2e2318" stroke-width="0.5" opacity="0.30" fill="none">
      <path d="M 58 48 Q 78 52, 95 60"/>
      <path d="M 57 54 Q 74 62, 90 72"/>
      <path d="M 56 44 Q 72 42, 90 42"/>
    </g>
    <!-- cratères secondaires -->
    <ellipse cx="80" cy="78" rx="7" ry="5.5" fill="none" stroke="#2e2318" stroke-width="1" opacity="0.5"/>
    <ellipse cx="80" cy="78" rx="7" ry="5.5" fill="#5c4a35" opacity="0.2"/>
    <circle cx="74" cy="38" r="2.5" fill="#4a3a28" opacity="0.3"/>
    <circle cx="34" cy="78" r="2" fill="#4a3a28" opacity="0.22"/>
  </g>
</svg>
